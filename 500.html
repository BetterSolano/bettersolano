<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Server error. We're experiencing technical difficulties on BetterSolano.org.">
    <meta name="author" content="Ramon Logan Jr.">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#1a5f2a">
    <title>500 - Server Error | BetterSolano.org</title>
    <link rel="icon" type="image/svg+xml" href="/assets/images/logo/favicon.svg">
    <link rel="apple-touch-icon" href="/assets/images/logo/favicon.svg">
    <style>
        /* Inline styles for 500 page - external resources may be unavailable */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .error-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: #d62828;
            line-height: 1;
        }
        .error-title {
            font-size: 2rem;
            margin: 1rem 0;
            color: #1a1a1a;
        }
        .error-desc {
            color: #666;
            max-width: 500px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            margin: 0.5rem;
        }
        .btn-primary {
            background: #0032a0;
            color: #fff;
        }
        .btn-primary:hover { background: #002170; }
        .btn-secondary {
            background: #e9ecef;
            color: #1a1a1a;
        }
        footer {
            padding: 1rem;
            text-align: center;
            color: #666;
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <main id="main-content">
        <section class="error-page">
            <div>
                <span class="error-code">500</span>
                <h1 class="error-title">Server Error</h1>
                <p class="error-desc">We're experiencing technical difficulties. Our team has been notified and is working to resolve the issue. Please try again later.</p>
                <div class="error-actions">
                    <a href="/" class="btn btn-primary">Go to Homepage</a>
                    <a href="/contact/" class="btn btn-secondary">Contact Us</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <span>&copy; 2025 Better Solano. All rights reserved.</span>
    </footer>
</body>

</html>
